<script>
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

function initParticles() {
    particles = [];
    const count = Math.floor((W * H) / 9000);
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.8 + 0.3,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            alpha: Math.random() * 0.5 + 0.1,
            color: Math.random() > 0.6 ? '#cc0000' : '#ff3333'
        });
    }
}
initParticles();

function drawParticles() {
    ctx.clearRect(0, 0, W, H);

    // رسم الخطوط بين الجسيمات القريبة
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(180,0,0,${0.12 * (1 - dist/120)})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }

    // رسم الجسيمات
    for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.round(p.alpha * 255).toString(16).padStart(2,'0');
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
}
drawParticles();
</script>

<script>
const API = '';
let token = localStorage.getItem('zerohost_token');
let currentLogBot = null, logWs = null, logLines = [], botsInterval = null;

function setToken(t) { token = t; localStorage.setItem('zerohost_token', t); }
function clearToken() { token = null; localStorage.removeItem('zerohost_token'); }

async function apiFetch(url, opts = {}) {
    const headers = { ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (opts.body && !(opts.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(API + url, { ...opts, headers });
    if (res.status === 401) { clearToken(); showLogin(); throw new Error('غير مصرح'); }
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'فشل الطلب');
    return data;
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    try {
        const data = await apiFetch('/api/login', {
            method: 'POST',
            body: { username: document.getElementById('username').value, password: document.getElementById('password').value }
        });
        setToken(data.access_token);
        showDashboard();
    } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
    }
});

function logout() { clearToken(); showLogin(); }

function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    if (botsInterval) clearInterval(botsInterval);
}

function showDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    refreshBots();
    botsInterval = setInterval(refreshBots, 5000);
}

document.getElementById('botFile').addEventListener('change', function() {
    document.getElementById('fileLabel').textContent = this.files[0]?.name || 'اختر ملف .zip';
});

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('botName').value.trim();
    const file = document.getElementById('botFile').files[0];
    if (!name || !file) return;
    const prog = document.getElementById('uploadProgress');
    const statusEl = document.getElementById('uploadStatus');
    prog.classList.remove('hidden');
    statusEl.textContent = 'جاري الرفع وتثبيت المتطلبات...';
    statusEl.className = 'text-brand-400';
    const fd = new FormData();
    fd.append('name', name);
    fd.append('file', file);
    try {
        await apiFetch('/api/bots/upload', { method: 'POST', body: fd, headers: {} });
        statusEl.textContent = '✅ تم رفع البوت بنجاح!';
        statusEl.className = 'text-green-400';
        document.getElementById('botName').value = '';
        document.getElementById('botFile').value = '';
        document.getElementById('fileLabel').textContent = 'اختر ملف .zip';
        refreshBots();
        setTimeout(() => prog.classList.add('hidden'), 2500);
    } catch (err) {
        statusEl.textContent = '❌ خطأ: ' + err.message;
        statusEl.className = 'text-red-400';
    }
});

async function refreshBots() {
    try { const bots = await apiFetch('/api/bots'); renderBots(bots); } catch(e) {}
}

function statusAr(s) {
    return s === 'running' ? 'يعمل' : s === 'stopped' ? 'متوقف' : s === 'crashed' ? 'متعطل' : s;
}

function renderBots(bots) {
    const list = document.getElementById('botsList');
    const running = bots.filter(b=>b.status==='running').length;
    const stopped = bots.filter(b=>b.status==='stopped').length;
    const crashed = bots.filter(b=>b.status==='crashed').length;
    document.getElementById('statTotal').textContent   = bots.length;
    document.getElementById('statRunning').textContent = running;
    document.getElementById('statStopped').textContent = stopped;
    document.getElementById('statCrashed').textContent = crashed;
    document.getElementById('runningCount').textContent = running;

    if (!bots.length) {
        list.innerHTML = `<div class="p-10 text-center text-gray-600">
            <svg class="w-14 h-14 mx-auto mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            لا توجد بوتات. ارفع أول بوت الآن!</div>`;
        return;
    }

    list.innerHTML = bots.map(bot => {
        const sc = bot.status==='running' ? 'text-green-400 bg-green-400/10'
                 : bot.status==='crashed' ? 'text-red-400 bg-red-400/10'

        const sd = bot.status==='running' ? 'bg-green-500'
                 : bot.status==='crashed' ? 'bg-red-500' : 'bg-gray-500';
        const typeIcon = bot.bot_type === 'python'
            ? `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 5.73 2.33 5.73 2.33l.01 2.42h6.37v.73H3.78S0 5.02 0 11.87c0 6.85 3.27 6.59 3.27 6.59h1.95v-3.13s-.1-3.27 3.22-3.27h5.56s3.11.05 3.11-3.02V3.38S17.98 0 12 0zm-3.1 1.56a1.73 1.73 0 110 3.46 1.73 1.73 0 010-3.46z"/><path d="M12 24c6.63 0 6.27-2.33 6.27-2.33l-.01-2.42h-6.37v-.73h8.33S24 18.98 24 12.13c0-6.85-3.27-6.59-3.27-6.59h-1.95v3.13s.1 3.27-3.22 3.27H9.77s-3.11-.05-3.11 3.02v4.93S6.02 24 12 24zm3.1-1.56a1.73 1.73 0 110-3.46 1.73 1.73 0 010 3.46z"/></svg>`
            : `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm0 2.16c5.44 0 9.84 4.4 9.84 9.84S17.44 21.84 12 21.84 2.16 17.44 2.16 12 6.56 2.16 12 2.16zM8 7.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm8 0a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM12 19.5c-3.04 0-5.64-1.82-6.84-4.44h13.68C17.64 17.68 15.04 19.5 12 19.5z"/></svg>`;

        return `<div class="px-4 py-4 hover:bg-red-950/20 transition fade-in" style="border-bottom:1px solid rgba(150,0,0,0.1);">
            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${bot.bot_type==='python'?'text-blue-400':'text-purple-400'}" style="background:rgba(20,0,0,0.6);border:1px solid rgba(150,0,0,0.2);">
                        ${typeIcon}
                    </div>
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold truncate">${escHtml(bot.name)}</span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${sc}">
                                <span class="inline-block w-1.5 h-1.5 rounded-full ${sd} mr-1 ${bot.status==='running'?'status-pulse':''}"></span>
                                ${statusAr(bot.status)}
                            </span>
                            <span class="text-xs text-gray-600 px-1.5 py-0.5 rounded" style="background:rgba(20,0,0,0.6);">${bot.bot_type}</span>
                        </div>
                        <div class="text-xs text-gray-600 mt-0.5" dir="ltr">
                            ${bot.script_file}${bot.pid?` · PID ${bot.pid}`:''}${bot.restart_count>0?` · إعادة: ${bot.restart_count}`:''}
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-1 shrink-0">
                    ${bot.status==='running'?`
                    <button onclick="stopBot('${escAttr(bot.name)}')" title="إيقاف"
                        class="p-2 rounded-lg text-red-500 hover:bg-red-500/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg>
                    </button>
                    <button onclick="restartBot('${escAttr(bot.name)}')" title="إعادة تشغيل"
                        class="p-2 rounded-lg text-amber-400 hover:bg-amber-400/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>`:
                    `<button onclick="startBot('${escAttr(bot.name)}')" title="تشغيل"
                        class="p-2 rounded-lg text-green-400 hover:bg-green-400/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

                    </button>
                    <button onclick="toggleAutoRestart('${escAttr(bot.name)}')" title="إعادة تلقائية"
                        class="p-2 rounded-lg transition ${bot.auto_restart?'text-cyan-400 bg-cyan-400/10':'text-gray-600 hover:bg-white/5'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                    <button onclick="deleteBot('${escAttr(bot.name)}')" title="حذف"
                        class="p-2 rounded-lg text-gray-600 hover:text-red-500 hover:bg-red-500/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </div>
            ${bot.error_message?`<div class="mt-2 text-xs text-red-400/60 rounded-lg px-3 py-2 truncate" style="background:rgba(180,0,0,0.08);">${escHtml(bot.error_message)}</div>`:''}
        </div>`;
    }).join('');
}

async function startBot(n)   { try { await apiFetch(`/api/bots/${encodeURIComponent(n)}/start`,  {method:'POST'}); refreshBots(); } catch(e) { alert(e.message); } }
async function stopBot(n)    { try { await apiFetch(`/api/bots/${encodeURIComponent(n)}/stop`,   {method:'POST'}); refreshBots(); } catch(e) { alert(e.message); } }
async function restartBot(n) { try { await apiFetch(`/api/bots/${encodeURIComponent(n)}/restart`,{method:'POST'}); refreshBots(); } catch(e) { alert(e.message); } }
async function toggleAutoRestart(n) { try { await apiFetch(`/api/bots/${encodeURIComponent(n)}/toggle-autorestart`,{method:'POST'}); refreshBots(); } catch(e) { alert(e.message); } }
async function deleteBot(n)  {
    if (!confirm(`حذف "${n}"؟ سيتم حذف كل الملفات.`)) return;
    try { await apiFetch(`/api/bots/${encodeURIComponent(n)}`,{method:'DELETE'}); refreshBots(); } catch(e) { alert(e.message); }
}

function openLogs(name) {
    currentLogBot = name; logLines = [];
    document.getElementById('logModalTitle').textContent = `سجلات — ${name}`;
    document.getElementById('logContent').innerHTML = '<div class="text-gray-600 text-center py-4">جاري الاتصال...</div>';
    document.getElementById('logModal').classList.remove('hidden');
    document.getElementById('liveIndicator').classList.remove('hidden');
    apiFetch(`/api/bots/${encodeURIComponent(name)}/logs?lines=200`).then(d => { logLines = d.logs||[]; renderLogs(); }).catch(()=>{});
    connectLogWs(name);
}
function connectLogWs(name) {
    if (logWs) { logWs.close(); logWs = null; }
    const proto = location.protocol==='https:'?'wss:':'ws:';
    logWs = new WebSocket(`${proto}//${location.host}/ws/logs/${encodeURIComponent(name)}`);
    logWs.onmessage = e => {
        try {
            const d = JSON.parse(e.data);
            if (d.type==='logs'&&d.lines) { logLines.push(...d.lines); if(logLines.length>2000)logLines=logLines.slice(-1500); renderLogs(); }
        } catch(err){}
    };
    logWs.onclose = () => setTimeout(()=>{ if(currentLogBot===name&&!document.getElementById('logModal').classList.contains('hidden'))connectLogWs(name); },3000);
}
function renderLogs() {
    const el = document.getElementById('logContent');
    if (!logLines.length) { el.innerHTML='<div class="text-gray-600 text-center py-4">لا توجد سجلات...</div>'; return; }
    const near = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    el.innerHTML = logLines.map(l => {
        const c = l.includes('ERROR')||l.includes('Traceback')||l.includes('Exception') ? 'text-red-400'
                : l.includes('WARNING')||l.includes('WARN') ? 'text-amber-400'
                : l.includes('INFO')||l.includes('SUCCESS') ? 'text-green-400' : 'text-gray-400';
        return `<div class="${c} whitespace-pre-wrap break-all">${escHtml(l)}</div>`;
    }).join('');
    if (near) el.scrollTop = el.scrollHeight;
}
function clearLogs() { document.getElementById('logContent').innerHTML=''; logLines=[]; }
function closeLogModal() {
    document.getElementById('logModal').classList.add('hidden');
    document.getElementById('liveIndicator').classList.add('hidden');
    currentLogBot=null;
    if(logWs){logWs.close();logWs=null;}
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

if (token) { apiFetch('/api/bots').then(()=>showDashboard()).catch(()=>showLogin()); }
else showLogin();
